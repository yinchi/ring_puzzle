# Simple workflow for building and deploying static content to GitHub Pages using Bun
name: Deploy static content to Pages using Bun

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]
    # Only run when files in the web/ directory or this workflow file changes
    paths: ["web/**", ".github/workflows/static.yml"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Build web UI
        run: bun build web/index.html --outdir build_web/ --minify
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build_web/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5